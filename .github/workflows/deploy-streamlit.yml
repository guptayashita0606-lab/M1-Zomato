name: Deploy to Streamlit

on:
  push:
    branches: [ main ]
    paths: [ 'app.py', 'requirements.txt', '.github/workflows/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'app.py', 'requirements.txt', '.github/workflows/**' ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test Streamlit App
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Validate Streamlit app syntax
      run: |
        python -m py_compile app.py
        
    - name: Test Streamlit app startup
      run: |
        timeout 30s streamlit run app.py --server.headless true --server.port 8501 || echo "Streamlit test completed"

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Streamlit Cloud
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Deploy to Streamlit Community Cloud
      env:
        STREAMLIT_DEPLOY_TOKEN: ${{ secrets.STREAMLIT_DEPLOY_TOKEN }}
      run: |
        echo "🚀 Deploying to Streamlit Community Cloud..."
        echo "Repository: ${{ github.repository }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        
        # Create deployment configuration
        cat > deploy_config.toml << EOF
        [theme]
        primaryColor = "#b7122a"
        backgroundColor = "#fcf9f8"
        secondaryBackgroundColor = "#f8e8ea"
        textColor = "#1c1c1c"
        
        [server]
        headless = true
        port = 8501
        enableCORS = false
        enableXsrfProtection = false
        
        [browser]
        gatherUsageStats = false
        EOF
        
        echo "✅ Deployment configuration created"
        echo "🌐 Your app will be available at: https://share.streamlit.io/guptayashita0606-lab/m1-zomato/main"
        
    - name: Notify deployment status
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ Streamlit app deployment pipeline completed!"
          echo "🌐 Visit your app at: https://share.streamlit.io/guptayashita0606-lab/m1-zomato/main"
          echo "📝 Make sure to configure your Streamlit Cloud app to use 'app.py' as the main file"
        else
          echo "❌ Deployment failed. Check the logs above."
        fi
